name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  MONGODB_URI: mongodb://localhost:27017/collabdocs-test
  JWT_SECRET: ci-jwt-secret-key-minimum-32-characters-long
  NEXTAUTH_SECRET: ci-nextauth-secret-minimum-32-characters
  NEXTAUTH_URL: http://localhost:3000
  REDIS_URL: redis://localhost:6379
  NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test, e2e]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: echo "Configure VERCEL_TOKEN and VERCEL_ORG_ID secrets for deployment"
